version: 2

models:
  - name: si_sales
    description: "Datos limpios y normalizados"

    columns:
      - name: transaction_sk
        tests:
          - unique
          - not_null

      - name: transaction_date
        tests:
          - not_null

      - name: customer_id
        tests:
          - not_null

      - name: amount_matches
        tests:
          - accepted_values:
              arguments:
                values: [true, false]